<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Color - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Catch the Color - A fast-paced reflex testing game. Tap the right color to win!">
</head>
<body>
    <div class="container">
        <main class="home-card">
            <h1 id="game-title">Catch the Color</h1>
            <p id="game-instructions">
                Tap only the circles matching the target color shown at the top. <br>
                <span>Wrong tap or miss = game over.</span>
            </p>
            <a href="game.html" class="btn" id="start-btn">Start Game</a>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
